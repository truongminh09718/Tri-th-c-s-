<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning Path</title>
    <style>
        :root {
            --bg-primary: #f4f7fb;
            --bg-secondary: #ffffff;
            --bg-result: #eef3fb;
            --text-primary: #333;
            --text-secondary: #1f4d7a;
            --border-color: #ccd6e0;
            --border-result: #d6e0f1;
            --button-bg: #1f4d7a;
            --button-hover: #163d5c;
            --shadow: rgba(0,0,0,0.08);
            --error-bg: #ffe7e7;
            --error-border: #f3c0c0;
            --error-text: #a72121;
        }

        html.dark-mode {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-result: #0f3460;
            --text-primary: #e0e0e0;
            --text-secondary: #64b5f6;
            --border-color: #2d3e50;
            --border-result: #1e3a5f;
            --button-bg: #2196f3;
            --button-hover: #1976d2;
            --shadow: rgba(0,0,0,0.3);
            --error-bg: #3d1f1f;
            --error-border: #5d3030;
            --error-text: #ff6b6b;
        }

        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .toggle-btn {
            background: var(--button-bg);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: var(--button-hover);
            transform: scale(1.05);
        }

        .toggle-btn::before {
            content: '';
            font-size: 16px;
        }

        html:not(.dark-mode) .toggle-btn::before {
            content: '🌙';
        }

        html.dark-mode .toggle-btn::before {
            content: '☀️';
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 16px 40px var(--shadow);
            padding: 30px;
        }

        h1 {
            margin-top: 0;
            color: var(--text-secondary);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }

        input[type="number"]::placeholder {
            color: var(--border-color);
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--button-bg);
            box-shadow: 0 0 8px var(--button-bg);
        }

        button {
            background: var(--button-bg);
            color: #fff;
            border: none;
            padding: 14px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-right: 12px;
            margin-bottom: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--shadow);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 10px;
            background: var(--bg-result);
            border: 1px solid var(--border-result);
            color: var(--text-primary);
        }

        .result p {
            margin: 12px 0;
            line-height: 1.6;
        }

        .result strong {
            color: var(--text-secondary);
            font-weight: 700;
        }

        .error {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
        }

        .error strong {
            color: var(--error-text);
        }

        p {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button class="toggle-btn" id="theme-toggle" title="Chuyển đổi chế độ sáng/tối">
            <span id="theme-text">Tối</span>
        </button>
    </div>

    <div class="container">
        <h1>AI Learning Path</h1>
        <p>Nhập dữ liệu để dự đoán GPA, TOEIC và mô phỏng xác suất đạt TOEIC 700.</p>

        <label for="study_hours_per_day">Giờ học mỗi ngày</label>
        <input id="study_hours_per_day" type="number" step="0.1" min="0" placeholder="Ví dụ: 3.5" />

        <label for="attendance_rate">Tỉ lệ chuyên cần (%)</label>
        <input id="attendance_rate" type="number" step="0.1" min="0" max="100" placeholder="Ví dụ: 85" />

        <label for="mock_test_score">Điểm kiểm tra thử</label>
        <input id="mock_test_score" type="number" step="0.1" min="0" placeholder="Ví dụ: 7.5" />

        <label for="historical_gpa">GPA hiện tại</label>
        <input id="historical_gpa" type="number" step="0.01" min="0" max="4" placeholder="Ví dụ: 3.2" />

        <div>
            <button id="btn-predict">Dự đoán GPA & TOEIC</button>
            <button id="btn-simulate">Mô phỏng TOEIC 700</button>
        </div>

        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        // ========== Theme Management ==========
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeText = document.getElementById('theme-text');
        const htmlElement = document.documentElement;

        // Load theme preference from localStorage, default to light mode
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            applyTheme(savedTheme);
        }

        // Apply theme and update button text
        function applyTheme(theme) {
            if (theme === 'dark') {
                htmlElement.classList.add('dark-mode');
                themeText.textContent = 'Sáng';
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.remove('dark-mode');
                themeText.textContent = 'Tối';
                localStorage.setItem('theme', 'light');
            }
        }

        // Toggle theme on button click
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.classList.contains('dark-mode') ? 'dark' : 'light';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        });

        // Initialize theme on page load
        initTheme();

        // ========== Original Functionality ==========
        const resultBox = document.getElementById('result');

        function getPayload() {
            return {
                study_hours_per_day: Number(document.getElementById('study_hours_per_day').value),
                attendance_rate: Number(document.getElementById('attendance_rate').value),
                mock_test_score: Number(document.getElementById('mock_test_score').value),
                historical_gpa: Number(document.getElementById('historical_gpa').value)
            };
        }

        function showResult(html, isError = false) {
            resultBox.style.display = 'block';
            resultBox.className = isError ? 'result error' : 'result';
            resultBox.innerHTML = html;
        }

        async function postData(endpoint) {
            const payload = getPayload();
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok || data.status === 'error') {
                    showResult(`<strong>Lỗi:</strong> ${data.message || 'Không thể nhận phản hồi.'}`, true);
                    return;
                }
                return data;
            } catch (error) {
                showResult(`<strong>Lỗi kết nối:</strong> ${error.message}`, true);
            }
        }

        document.getElementById('btn-predict').addEventListener('click', async () => {
            const data = await postData('/api/predict');
            if (!data) return;
            showResult(`
                <p><strong>Kết quả dự đoán:</strong></p>
                <p>GPA dự đoán: <strong>${data.predicted_gpa}</strong></p>
                <p>TOEIC dự đoán: <strong>${data.predicted_toeic}</strong></p>
            `);
        });

        document.getElementById('btn-simulate').addEventListener('click', async () => {
            const data = await postData('/api/twin-simulation');
            if (!data) return;
            showResult(`
                <p><strong>Mô phỏng Academic Twin:</strong></p>
                <p>Mục tiêu: <strong>${data.target}</strong></p>
                <p>Xác suất thành công: <strong>${data.probability_success_percent}%</strong></p>
            `);
        });
    </script>
</body>
</html>
