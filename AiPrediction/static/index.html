<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning Path</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.08);
            padding: 30px;
        }
        h1 {
            margin-top: 0;
            color: #1f4d7a;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccd6e0;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            background: #1f4d7a;
            color: #fff;
            border: none;
            padding: 14px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-right: 12px;
        }
        button:hover {
            background: #163d5c;
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 10px;
            background: #eef3fb;
            border: 1px solid #d6e0f1;
        }
        .error {
            background: #ffe7e7;
            border-color: #f3c0c0;
            color: #a72121;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Learning Path</h1>
        <p>Nhập dữ liệu để dự đoán GPA, TOEIC và mô phỏng xác suất đạt TOEIC 700.</p>

        <label for="study_hours_per_day">Giờ học mỗi ngày</label>
        <input id="study_hours_per_day" type="number" step="0.1" min="0" placeholder="Ví dụ: 3.5" />

        <label for="attendance_rate">Tỉ lệ chuyên cần (%)</label>
        <input id="attendance_rate" type="number" step="0.1" min="0" max="100" placeholder="Ví dụ: 85" />

        <label for="mock_test_score">Điểm kiểm tra thử</label>
        <input id="mock_test_score" type="number" step="0.1" min="0" placeholder="Ví dụ: 7.5" />

        <label for="historical_gpa">GPA hiện tại</label>
        <input id="historical_gpa" type="number" step="0.01" min="0" max="4" placeholder="Ví dụ: 3.2" />

        <div>
            <button id="btn-predict">Dự đoán GPA & TOEIC</button>
            <button id="btn-simulate">Mô phỏng TOEIC 700</button>
        </div>

        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        const resultBox = document.getElementById('result');

        function getPayload() {
            return {
                study_hours_per_day: Number(document.getElementById('study_hours_per_day').value),
                attendance_rate: Number(document.getElementById('attendance_rate').value),
                mock_test_score: Number(document.getElementById('mock_test_score').value),
                historical_gpa: Number(document.getElementById('historical_gpa').value)
            };
        }

        function showResult(html, isError = false) {
            resultBox.style.display = 'block';
            resultBox.className = isError ? 'result error' : 'result';
            resultBox.innerHTML = html;
        }

        async function postData(endpoint) {
            const payload = getPayload();
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok || data.status === 'error') {
                    showResult(`<strong>Lỗi:</strong> ${data.message || 'Không thể nhận phản hồi.'}`, true);
                    return;
                }
                return data;
            } catch (error) {
                showResult(`<strong>Lỗi kết nối:</strong> ${error.message}`, true);
            }
        }

        document.getElementById('btn-predict').addEventListener('click', async () => {
            const data = await postData('/api/predict');
            if (!data) return;
            showResult(`
                <p><strong>Kết quả dự đoán:</strong></p>
                <p>GPA dự đoán: <strong>${data.predicted_gpa}</strong></p>
                <p>TOEIC dự đoán: <strong>${data.predicted_toeic}</strong></p>
            `);
        });

        document.getElementById('btn-simulate').addEventListener('click', async () => {
            const data = await postData('/api/twin-simulation');
            if (!data) return;
            showResult(`
                <p><strong>Mô phỏng Academic Twin:</strong></p>
                <p>Mục tiêu: <strong>${data.target}</strong></p>
                <p>Xác suất thành công: <strong>${data.probability_success_percent}%</strong></p>
            `);
        });
    </script>
</body>
</html>
